name: Deploy Bot Ferragem Marlene

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. O GitHub pega o código atualizado do seu repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. O GitHub copia os arquivos do projeto para o seu servidor no Google Cloud
      - name: Copiar arquivos para o servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/bot-ferragem"

      # 3. O GitHub acessa o servidor e roda o Docker para subir o bot
      - name: Executar Docker no Servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            cd ~/bot-ferragem
            # Constrói a imagem do Docker com o código novo
            docker build -t bot-image .
            
            # Para e deleta a versão antiga do bot (se existir)
            docker stop bot-marlene || true
            docker rm bot-marlene || true
            
            # Certifica de que o arquivo SQlite exista antes no servidor pra poder montar
            touch ~/bot-ferragem/dev.db
            
            # Criar arquivo .env dinamicamente com os secrets
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > ~/bot-ferragem/.env
            echo "WHATSAPP_PHONE_NUMBER=${{ secrets.WHATSAPP_PHONE_NUMBER }}" >> ~/bot-ferragem/.env
            echo "SNAPCONTROL_URL=${{ secrets.SNAPCONTROL_URL }}" >> ~/bot-ferragem/.env
            echo "SNAPCONTROL_USER=${{ secrets.SNAPCONTROL_USER }}" >> ~/bot-ferragem/.env
            echo "SNAPCONTROL_PASS=${{ secrets.SNAPCONTROL_PASS }}" >> ~/bot-ferragem/.env
            echo "DASHBOARD_USER=${{ secrets.DASHBOARD_USER }}" >> ~/bot-ferragem/.env
            echo "DASHBOARD_PASS=${{ secrets.DASHBOARD_PASS }}" >> ~/bot-ferragem/.env
            echo "DATABASE_URL=\"file:./dev.db\"" >> ~/bot-ferragem/.env
            echo "GOOGLE_SHEETS_URL_PRINCIPAL=${{ secrets.GOOGLE_SHEETS_URL_PRINCIPAL }}" >> ~/bot-ferragem/.env
            echo "GOOGLE_SHEETS_URL_GERAL=${{ secrets.GOOGLE_SHEETS_URL_GERAL }}" >> ~/bot-ferragem/.env
            echo "TZ=America/Sao_Paulo" >> ~/bot-ferragem/.env
            
            # Roda a versão nova em segundo plano
            docker run -d -p 3000:3000 --env-file ~/bot-ferragem/.env -v ~/bot-ferragem/auth_info_baileys:/app/auth_info_baileys -v ~/bot-ferragem/dev.db:/app/dev.db --name bot-marlene bot-image
            
            # Aguarda o container ligar o banco de dados e o navegador invisível
            echo "Aguardando o bot ligar o motor..."
            sleep 30
            
            # Enhanced health check with better diagnostics
            RETRY_COUNT=0
            MAX_RETRIES=24
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/ 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
                echo "✓ Bot respondendo com HTTP $HTTP_CODE"
                break
              fi
              echo "Tentativa $((RETRY_COUNT+1))/$MAX_RETRIES - Status: $HTTP_CODE"
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 5
            done
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "✗ Bot não iniciou após 120 segundos"
              echo "Logs do container para debug:"
              docker logs bot-marlene
              exit 1
            fi
            
            sleep 10
            
            echo "Servidor 100% online! Disparando configurações REST remotas..."
            
            curl -X POST http://localhost:3000/api/toggle -H "Content-Type: application/json" -d '{"type":"power","enabled":true}'
            curl -X POST http://localhost:3000/api/toggle -H "Content-Type: application/json" -d '{"type":"test","enabled":true}'
            curl -X POST http://localhost:3000/api/toggle -H "Content-Type: application/json" -d '{"type":"fullstock","enabled":false}'
            curl -X POST http://localhost:3000/api/start