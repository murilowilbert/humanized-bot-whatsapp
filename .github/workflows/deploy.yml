name: Deploy Bot Ferragem Marlene

on:
  push:
    branches: [ "main", "master" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. O GitHub pega o código atualizado do seu repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Decodifica a Chave SSH de Base64 para o arquivo original
      - name: Decode SSH Private Key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > private_key.pem
          chmod 600 private_key.pem

      # 3. O GitHub copia os arquivos do projeto para o seu servidor no Google Cloud
      - name: Copiar arquivos para o servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key_path: "private_key.pem"
          source: "."
          target: "~/bot-ferragem"

      # 4. O GitHub acessa o servidor e roda o Docker para subir o bot
      - name: Executar Docker no Servidor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key_path: "private_key.pem"
          command_timeout: 45m
          script: |
            cd ~/bot-ferragem
            # Constrói a imagem do Docker com o código novo
            docker build -t bot-image .
            # Para e deleta a versão antiga do bot (se existir)
            docker stop bot-marlene || true
            docker rm bot-marlene || true
            # Certifica de que o arquivo SQlite exista antes no servidor pra poder montar
            touch ~/bot-ferragem/dev.db
            # Roda a versão nova em segundo plano
            docker run -d -p 3000:3000 -v ~/bot-ferragem/auth_info_baileys:/app/auth_info_baileys -v ~/bot-ferragem/dev.db:/app/dev.db --name bot-marlene bot-image
